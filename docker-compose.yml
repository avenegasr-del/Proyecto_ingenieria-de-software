version: "3.9"

networks:
  travel-net:
    driver: bridge

volumes:
  itinerary-data:
  sonar-data:
  sonar-logs:

services:

  # ── Airport Service ────────────────────────────────────────────────────────
  airport-service:
    build:
      context: ./airport-service
      dockerfile: Dockerfile
    container_name: airport-service
    ports:
      - "8001:8001"
    environment:
      API_COLOMBIA_URL: "https://api-colombia.com/api/v1"
      LOG_LEVEL: "INFO"
      HTTP_TIMEOUT: "10.0"
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Itinerary Service ──────────────────────────────────────────────────────
  itinerary-service:
    build:
      context: ./itinerary-service
      dockerfile: Dockerfile
    container_name: itinerary-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: "sqlite:////app/data/itineraries.db"
      AIRPORT_SERVICE_URL: "http://airport-service:8001"
      LOG_LEVEL: "INFO"
      HTTP_TIMEOUT: "10.0"
    volumes:
      - itinerary-data:/app/data
    depends_on:
      airport-service:
        condition: service_healthy
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: nginx:1.27-alpine
    container_name: travel-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - airport-service
      - itinerary-service
    networks:
      - travel-net
    restart: unless-stopped
# Actualización de control de hoy

  # ── SonarQube (optional, comment out if not needed) ────────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-logs:/opt/sonarqube/logs
    networks:
      - travel-net
    restart: unless-stopped
    profiles:
      - sonar
